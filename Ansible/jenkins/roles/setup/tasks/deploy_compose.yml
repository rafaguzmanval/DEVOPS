---
# Tasks to deploy Jenkins and Docker Cloud using Docker Compose
# Tags: setup, deploy, always
- name: Deploy Jenkins stack with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ jenkins_compose_dir | default('/opt/jenkins') }}"
    state: present
    wait: true # Recomendado: espera a que los contenedores estén 'healthy'
  register: compose_result
  tags:
    - setup
    - deploy
    - compose
    - always

- name: Healthcheck and Log Capture
  block:
    - name: Ensure Jenkins is stable and responding
      uri: # Es mejor usar el módulo 'uri' que 'curl' por shell
        url: "http://localhost:{{ jenkins_host_port | default(8080) }}/login"
        status_code: 200
      register: jenkins_stable
      retries: 3
      delay: 5
      until: jenkins_stable.status == 200
      changed_when: false

  rescue:
    - name: Get Jenkins container logs on failure
      # Usamos el nombre del servicio definido en tu docker-compose.yml
      command: "docker compose -p {{ compose_result.project_name }} logs"
      register: container_logs
      changed_when: false
      args:
        chdir: "{{ jenkins_compose_dir | default('/opt/jenkins') }}"

    - name: Display Jenkins logs
      debug:
        msg: "{{ container_logs.stdout_lines }}"
      failed_when: true