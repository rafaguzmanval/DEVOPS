---
# Tasks to install and configure Docker
# Tags: setup, docker, always

- name: Install Docker (Debian/Ubuntu)
  block:
    - name: Install Docker dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true
      become: true
      tags:
        - setup
        - docker
        - packages
        - always

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      become: true
      tags:
        - setup
        - docker
        - always

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      become: true
      tags:
        - setup
        - docker
        - always

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose
        state: present
        update_cache: true
      become: true
      tags:
        - setup
        - docker
        - packages
        - always
  when: ansible_os_family == "Debian"

- name: Install Docker (RHEL/CentOS/Rocky/Alma)
  block:
    - name: Add Docker repository
      # En RHEL 9 no usamos yum_repository manual con variables de arquitectura si podemos evitarlo.
      # Es más seguro usar el comando oficial para que autodetecte todo.
      command: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
      become: true
      changed_when: false

    - name: Install Docker
      dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        # Esto soluciona conflictos con paquetes de Podman que vienen en RHEL 9
        nobest: true
      become: true

    - name: Ensure Docker service is started and enabled
      # ESTE ES EL PASO QUE TE FALTABA
      # En RHEL, dnf instala el paquete pero NO arranca el servicio ni el socket.
      systemd:
        name: docker
        state: started
        enabled: yes
      become: true
  when: ansible_os_family == "RedHat"

- name: Add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  become: true

- name: Force a restart of the SSH session to apply group changes
  # Si Ansible intenta usar Docker justo después de añadir el grupo, fallará
  # porque la sesión actual no sabe que ya eres del grupo 'docker'.
  meta: reset_connection
