---
# Main tasks for Jenkins Setup role
# Execution order (each step depends on the previous):
#   1. Install Docker (platform-specific)
#   2. Install Python dependencies for Docker modules
#   3. Generate Docker Compose file and JCasC templates
#   4. Deploy Jenkins via Docker Compose
#   5. Build custom agent images (dind, git)

- name: Install Docker
  include_tasks: tasks/install_docker.yml
  tags:
    - docker

- name: Install python
  include_tasks: tasks/install_python.yml
  tags:
    - python

- name: Prepare jcasc and Docker Compose files
  include_tasks: tasks/prepare_jcasc.yml
  tags:
    - prepare
    - jcasc
    - compose

- name: Deploy Jenkins with Docker Compose
  include_tasks: tasks/deploy_compose.yml
  tags:
    - deploy

- name: Build custom images
  include_tasks: tasks/build_custom_images.yml
  tags:
    - build-inner-image