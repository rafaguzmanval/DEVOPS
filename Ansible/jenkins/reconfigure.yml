---
# Reconfigure Jenkins — regenerate all JCasC configs and reload
# Wrapper around the unified dispatcher (jenkins.yml)
#
# Usage:
#   ansible-playbook reconfigure.yml -e "target_hosts=jenkins_servers"

- name: Reconfigure Jenkins
  ansible.builtin.import_playbook: jenkins.yml
  vars:
    host: "{{ target_hosts | default('all') }}"
    role_to_execute: reconfigure
