# Jenkins credentials managed by the reconfigure role
# Each entry under additional_credentials is rendered by
# roles/reconfigure/templates/jcasc-credentials.yaml.j2
#
# Supported credential types: usernamePassword, sshUserPrivateKey, string, etc.
# See: https://plugins.jenkins.io/credentials/ for full type reference.
---
additional_credentials:
  - usernamePassword:
      scope: SYSTEM
      id: "docker-registry-credentials"
      username: "docker-user"
      password: "docker-password"
      description: "Docker Registry Credentials"
  - usernamePassword:
      scope: GLOBAL
      id: "github-access"
      username: "my-github-user"
      password: "ghp-secret-token"
      description: "GitHub Access Token"
